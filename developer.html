<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle"></title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .developer-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .developer-hero {
            background: linear-gradient(135deg, var(--primary-color) 0%, #004a99 100%);
            color: white;
            padding: 4rem 0;
            text-align: center;
        }

        .developer-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .developer-hero p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .developer-container {
            flex: 1;
            padding: 4rem 0;
        }

        .developer-profile {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
            margin-bottom: 4rem;
        }

        .developer-photo {
            text-align: center;
        }

        .developer-photo img {
            width: 100%;
            max-width: 350px;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            border: 4px solid var(--primary-color);
            transition: var(--transition);
        }

        .developer-photo img:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 60px rgba(0, 102, 204, 0.3);
        }

        .developer-info h2 {
            font-size: 2.2rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .developer-title {
            font-size: 1.5rem;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .developer-meta {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem 0;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.1rem;
            color: var(--text-light);
        }

        .meta-item i {
            font-size: 1.3rem;
            color: var(--primary-color);
            min-width: 30px;
        }

        .meta-item strong {
            color: var(--text-dark);
        }

        .developer-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-light);
            margin: 2rem 0;
        }

        .social-links-dev {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .social-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .social-link-btn:hover {
            background: #004a99;
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.3);
        }

        .skills-section {
            background: var(--light-bg);
            padding: 3rem;
            border-radius: var(--border-radius);
            margin-bottom: 2rem;
        }

        .skills-section h3 {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
        }

        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .skill-badge {
            background: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: var(--transition);
        }

        .skill-badge:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-5px);
        }

        .cta-contact {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
            border-radius: var(--border-radius);
            text-align: center;
            margin-top: 3rem;
        }

        .cta-contact h3 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .cta-contact p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            opacity: 0.95;
        }

        .cta-button-dev {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: white;
            color: var(--primary-color);
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            margin: 0 0.5rem;
        }

        .cta-button-dev:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 1.5rem;
            background: var(--light-bg);
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            text-decoration: none;
            transition: var(--transition);
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .back-button:hover {
            background: var(--primary-color);
            color: white;
        }

        @media (max-width: 768px) {
            .developer-profile {
                grid-template-columns: 1fr;
                gap: 2rem;
            }

            .developer-photo img {
                max-width: 250px;
            }

            .developer-hero h1 {
                font-size: 2rem;
            }

            .developer-info h2 {
                font-size: 1.8rem;
            }

            .skills-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            }

            .social-links-dev {
                flex-wrap: wrap;
            }

            .developer-container {
                padding: 2rem 0;
            }
        }

        @media (max-width: 480px) {
            .developer-hero {
                padding: 2rem 0;
            }

            .developer-hero h1 {
                font-size: 1.5rem;
            }

            .developer-hero p {
                font-size: 1rem;
            }

            .developer-profile {
                gap: 1.5rem;
            }

            .developer-photo img {
                max-width: 200px;
            }

            .developer-info h2 {
                font-size: 1.5rem;
            }

            .developer-title {
                font-size: 1.2rem;
            }

            .developer-description {
                font-size: 1rem;
            }

            .meta-item {
                font-size: 1rem;
            }

            .social-links-dev {
                flex-direction: column;
            }

            .social-link-btn {
                width: 100%;
                justify-content: center;
            }

            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
            }

            .skill-badge {
                padding: 0.8rem;
                font-size: 0.9rem;
            }

            .skills-section {
                padding: 1.5rem;
            }

            .cta-contact {
                padding: 1.5rem;
            }

            .developer-container {
                padding: 1rem 0;
            }
        }

        /* Extra Small Devices (360px and below) */
        @media (max-width: 360px) {
            .developer-hero {
                padding: 1.5rem 0;
                background: linear-gradient(135deg, var(--primary-color) 0%, #004a99 100%);
            }

            .developer-hero h1 {
                font-size: 1.3rem;
                margin-bottom: 0.5rem;
            }

            .developer-hero p {
                font-size: 0.85rem;
            }

            .container {
                padding: 0 10px;
            }

            .developer-profile {
                grid-template-columns: 1fr;
                gap: 1.2rem;
                padding: 1.2rem;
            }

            .developer-photo {
                text-align: center;
            }

            .developer-photo img {
                max-width: 150px;
                height: auto;
            }

            .developer-info {
                padding: 0;
            }

            .developer-info h2 {
                font-size: 1.3rem;
                margin-bottom: 0.8rem;
            }

            .developer-title {
                font-size: 1rem;
                margin-bottom: 0.5rem;
            }

            .developer-description {
                font-size: 0.85rem;
                line-height: 1.4;
                margin-bottom: 1rem;
            }

            .meta-grid {
                gap: 0.8rem;
            }

            .meta-item {
                padding: 0.8rem;
                font-size: 0.85rem;
            }

            .meta-label {
                font-size: 0.8rem;
            }

            .meta-value {
                font-size: 0.9rem;
            }

            .social-links-dev {
                flex-direction: column;
                gap: 0.8rem;
                margin-top: 1rem;
            }

            .social-link-btn {
                width: 100%;
                padding: 0.8rem;
                font-size: 0.9rem;
            }

            .skills-section {
                padding: 1.2rem;
                margin: 1.2rem 0;
            }

            .skills-section h3 {
                font-size: 1.2rem;
                margin-bottom: 1rem;
            }

            .skills-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.6rem;
            }

            .skill-badge {
                padding: 0.6rem;
                font-size: 0.8rem;
                border-radius: 8px;
            }

            .cta-contact {
                padding: 1.2rem;
                margin: 1.2rem 0;
                border-radius: 12px;
            }

            .cta-contact h3 {
                font-size: 1.2rem;
                margin-bottom: 0.8rem;
            }

            .cta-contact p {
                font-size: 0.85rem;
                margin-bottom: 1rem;
            }

            .cta-button {
                padding: 0.8rem 1.5rem;
                font-size: 0.9rem;
            }

            .developer-container {
                padding: 1rem 0;
            }

            .developer-page {
                padding-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-tooth"></i>
                <span id="navBrand"></span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="index.html#director" class="nav-link">Director</a></li>
                <li><a href="index.html#branches" class="nav-link">Our Branches</a></li>
                <li><a href="index.html#treatments" class="nav-link">Treatments</a></li>
                <li><a href="index.html#gallery" class="nav-link">Gallery</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Developer Hero -->
    <section class="developer-hero">
        <div class="container">
            <h1 id="devTitle"></h1>
            <p id="devSubtitle"></p>
        </div>
    </section>

    <!-- Developer Container -->
    <div class="container developer-container">

        <!-- Developer Profile -->
        <div class="developer-profile">
            <!-- Photo -->
            <div class="developer-photo">
                <img id="devPhoto" src="" alt="Developer">
            </div>

            <!-- Info -->
            <div class="developer-info">
                <h2 id="devName"></h2>
                <p class="developer-title" id="devJobTitle"></p>

                <p class="developer-description" id="devDescription"></p>

                <div class="developer-meta">
                    <div class="meta-item">
                        <i class="fas fa-graduation-cap"></i>
                        <div><strong>Education:</strong> <span id="devQualification"></span></div>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-building"></i>
                        <div><strong>Current Company:</strong> <span id="devCompany"></span></div>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-map-marker-alt"></i>
                        <div><strong>Location:</strong> <span id="devLocation"></span></div>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-envelope"></i>
                        <div><strong>Email:</strong> <a href="mailto:#" id="devEmailLink" style="color: var(--primary-color);"></a></div>
                    </div>
                </div>

                <div class="social-links-dev">
                    <a href="#" id="devPortBtn" class="social-link-btn">
                        <i class="fas fa-briefcase"></i> Portfolio
                    </a>
                    <a href="#" id="devLinkedin" class="social-link-btn" target="_blank">
                        <i class="fab fa-linkedin"></i> LinkedIn
                    </a>
                    <a href="#" id="devInstagram" class="social-link-btn" target="_blank">
                        <i class="fab fa-instagram"></i> Instagram
                    </a>
                </div>
            </div>
        </div>

        <!-- CTA Section -->
        <div class="cta-contact">
            <h3>Let's Work Together</h3>
            <p>Interested in web development or have a project in mind? Let's connect!</p>
            <a href="mailto:#" id="ctaEmailLink" class="cta-button-dev">Get in Touch</a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3 id="footerBrand"><i class="fas fa-tooth"></i></h3>
                    <p id="footerAbout"></p>
                    <div class="social-links" id="socialLinks">
                        <a href="#" class="social-link" id="socialFacebook"><i class="fab fa-facebook"></i></a>
                        <a href="#" class="social-link" id="socialInstagram"><i class="fab fa-instagram"></i></a>
                        <a href="#" class="social-link" id="socialTwitter"><i class="fab fa-twitter"></i></a>
                        <a href="#" class="social-link" id="socialYoutube"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>

                <div class="footer-section" id="footerQuickLinks">
                    <h4>Quick Links</h4>
                    <ul id="quickLinksList">
                    </ul>
                </div>

                <div class="footer-section" id="footerServices">
                    <h4>Services</h4>
                    <ul id="servicesList">
                    </ul>
                </div>
            </div>

            <div class="footer-bottom">
                <p id="footerCopyright"></p>
            </div>
        </div>
    </footer>

    <script src="config.js"></script>
    <script>
        // Populate developer page from config
        function populateDeveloperPage() {
            if (typeof clinicConfig === 'undefined') {
                console.error('clinicConfig not found. Make sure config.js is loaded before script.js');
                return;
            }

            const dev = clinicConfig.developer;
            const clinic = clinicConfig.branding;

            // Header
            document.getElementById('pageTitle').textContent = `${dev.name} - Developer`;
            document.getElementById('navBrand').textContent = clinic.name;

            // Hero Section
            document.getElementById('devTitle').textContent = dev.sectionTitle;
            document.getElementById('devSubtitle').textContent = dev.sectionSubtitle;

            // Developer Info
            document.getElementById('devPhoto').src = dev.photo;
            document.getElementById('devPhoto').alt = dev.name;
            document.getElementById('devName').textContent = dev.name;
            document.getElementById('devJobTitle').textContent = dev.title;
            document.getElementById('devDescription').textContent = dev.description;
            document.getElementById('devQualification').textContent = dev.qualification;
            document.getElementById('devCompany').textContent = dev.company;
            document.getElementById('devLocation').textContent = dev.location;

            // Email Links
            document.getElementById('devEmailLink').href = `mailto:${dev.email}`;
            document.getElementById('devEmailLink').textContent = dev.email;
            document.getElementById('devPortBtn').href = dev.portfolio;
            document.getElementById('ctaEmailLink').href = `mailto:${dev.email}`;

            // Social Links
            document.getElementById('devLinkedin').href = dev.linkedin;
            document.getElementById('devInstagram').href = dev.instagram;
            document.getElementById('devPortBtn').href = dev.portfolio;

            // Skills
            const skillsGrid = document.getElementById('skillsGrid');
            if (dev.skills && dev.skills.length > 0) {
                skillsGrid.innerHTML = dev.skills.map(skill => 
                    `<div class="skill-badge">${skill}</div>`
                ).join('');
            }

            // Footer
            document.getElementById('footerBrand').innerHTML = `<i class="fas fa-tooth"></i> ${clinic.name}`;
            document.getElementById('footerAbout').textContent = clinicConfig.footer.about;

            // Quick Links
            const quickLinksList = document.getElementById('quickLinksList');
            clinicConfig.footer.quickLinks.forEach(link => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${link.href}">${link.label}</a>`;
                quickLinksList.appendChild(li);
            });

            // Services
            const servicesList = document.getElementById('servicesList');
            clinicConfig.footer.services.forEach(service => {
                const li = document.createElement('li');
                li.innerHTML = `<a href="${service.href}">${service.label}</a>`;
                servicesList.appendChild(li);
            });

            // Copyright
            const year = new Date().getFullYear();
            document.getElementById('footerCopyright').textContent = 
                `© ${year} ${clinic.name}. All rights reserved. | Developed by ${dev.name}`;

            // Social Links
            document.getElementById('socialFacebook').href = clinicConfig.social.facebook;
            document.getElementById('socialInstagram').href = clinicConfig.social.instagram;
            document.getElementById('socialTwitter').href = clinicConfig.social.twitter;
            document.getElementById('socialYoutube').href = clinicConfig.social.youtube;

            console.log('✅ Developer page populated from config.js');
        }

        // Hamburger menu
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.querySelector('.hamburger');
            const navMenu = document.querySelector('.nav-menu');

            if (hamburger) {
                hamburger.addEventListener('click', function() {
                    navMenu.classList.toggle('active');
                    hamburger.classList.toggle('active');
                });
            }

            // Close menu when link is clicked
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function() {
                    navMenu.classList.remove('active');
                    hamburger.classList.remove('active');
                });
            });

            // Populate page
            populateDeveloperPage();
        });
    </script>
</body>
</html>
